name: '"Barkus" Thorne'
role: co-chair
company: Potomac Pawductivity Partners
bio: >-
  Barkus, the founding Golden Retriever behind State of the Stack's "Pawsitive
  Culture" initiative, brings a unique perspective to the D.C. tech scene.
  Formerly a "Senior Security Blanket Monitor" and "Lead Ballistics Technician
  (Tennis Division)," Barkus transitioned to community management after
  realizing the critical importance of tail-wagging and treat-based incentives
  in high-stress DevOps environments. A passionate advocate for longer nap
  breaks and a completely pet-friendly ecosystem in the DMV, Barkus is dedicated
  to fostering an inclusive, high-morale conference experience where everyone
  feels like a good boy or girl. When not greeting attendees, Barkus can be
  found auditing the conference snack bar and ensuring all boundary markers
  (like the Washington Monument) are properly inspected.
