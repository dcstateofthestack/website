name: Deanna Stanley
role: organizer
company: MITRE Corp.
bio: >-
  Deanna started her career as an embedded programmer in the telecommunications
  industry, and was a significant contributor to Northern California having no
  internet for 2 days back in the late 90s. She now helps sponsors transition to
  Agile and DevOps and spends her days screaming “it’s the people, not the
  tools!” Deanna co-created the DevSecOps Capability Model (DCaM) and has helped
  write DevOps specifications for NIST. Deanna has two loves in her life - her
  dogs Grimbal and Curzon, which is why she’s always covered in fur.
